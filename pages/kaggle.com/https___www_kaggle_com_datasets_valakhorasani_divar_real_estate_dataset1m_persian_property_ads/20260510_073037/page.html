    <script nonce="H76HP4mpDBnIk8WWiniZSg==" type="application/ld+json">{"@context":"http://schema.org/","@type":"Dataset","name":"Divar 2025 Real Estate Dataset","description":"This dataset presents over **1 million** anonymized real estate advertisements sourced from **Divar**, one of Iran's leading online classifieds platforms. It offers a rich, structured snapshot of Iran's property market, including rental and sales listings from various cities and neighborhoods, spanning a multi-year period. It is ideal for applications in Natural Language Processing (NLP), price prediction, recommendation systems, and urban analytics.\n\n**Key Features:**\n\n-cat2_slug / cat3_slug: Category and subcategory tags (e.g., residential-rent, apartment-sell).\n\n-city_slug / neighborhood_slug: Geolocation tags including major cities like Tehran, Mashhad, etc.\n\n-created_at_month: Timestamp of ad posting, allowing for time-series and trend analysis.\n\n-user_type: Indicates whether the ad was posted by an individual or an agency.\n\n-title / description: Free-text fields suitable for Persian NLP tasks such as keyword extraction or sentiment analysis.\n\n-price_value / rent_value / credit_value: Numerical fields for property pricing, suitable for training regression models.\n\n-property features: Rich metadata like:\n\n-land_size, building_size, floor, rooms_count\n\n-Boolean flags for amenities: has_elevator, has_parking, has_pool, etc.\n\n-construction_year, has_heating_system, has_cooling_system\n\n-location_latitude / location_longitude / location_radius: Geospatial coordinates for mapping and spatial clustering tasks.\n\n-rent_mode, price_mode, deed_type, unit_per_floor: Additional fields for filtering and classification.\n\n**Potential Applications**\n🏡 Smart Price Estimation: Train ML models to estimate sale/rent prices based on listing features.\n\n🔍 Recommender Systems: Build personalized property recommenders using location and property features.\n\n🧠 Persian NLP: Preprocess and analyze Farsi text for keyphrase extraction, topic modeling, etc.\n\n📈 Market Trend Analysis: Track temporal changes in the housing market and visualize pricing trends.\n\n📊 Urban Analytics: Analyze housing patterns by region, neighborhood, or building type.","url":"https://www.kaggle.com/valakhorasani/divar-real-estate-dataset1m-persian-property-ads","version":1,"keywords":["task, classification","technique, data visualization","analysis, nlp","subject, people and society, business, real estate","task, clustering"],"license":{"@type":"CreativeWork","name":"CC BY-SA 4.0","url":"https://creativecommons.org/licenses/by-sa/4.0/"},"identifier":["7133709"],"includedInDataCatalog":{"@type":"DataCatalog","name":"Kaggle","url":"https://www.kaggle.com"},"creator":{"@type":"Person","name":"vala khorasani","url":"https://www.kaggle.com/valakhorasani","image":"https://storage.googleapis.com/kaggle-avatars/thumbnails/19065304-kg.jpg?t=2024-09-25-09-54-04"},"distribution":[{"@type":"DataDownload","requiresSubscription":true,"encodingFormat":"zip","fileFormat":"zip","contentUrl":"https://www.kaggle.com/datasets/valakhorasani/divar-real-estate-dataset1m-persian-property-ads/download?datasetVersionNumber=1","contentSize":"225657375 bytes"}],"commentCount":0,"dateModified":"2025-04-13T16:33:57.757Z","discussionUrl":"https://www.kaggle.com/valakhorasani/divar-real-estate-dataset1m-persian-property-ads/discussion","alternateName":" 1 Million Anonymized Real Estate Listings Dataset for Farsi NLP,AI,and Research","isAccessibleForFree":true,"thumbnailUrl":"https://storage.googleapis.com/kaggle-datasets-images/7133709/11391115/133f691cef9eee1da28a38288955c7cc/dataset-card.jpg?t=2025-04-13-16-51-25","interactionStatistic":[{"@type":"InteractionCounter","interactionType":"http://schema.org/CommentAction","userInteractionCount":0},{"@type":"InteractionCounter","interactionType":"http://schema.org/DownloadAction","userInteractionCount":258},{"@type":"InteractionCounter","interactionType"
